#:schema https://raw.githubusercontent.com/eitsupi/arf/main/artifacts/arf.schema.json
# arf configuration file
#
# Documentation: https://github.com/eitsupi/arf

[startup]
r_source = "auto"
show_banner = false

[editor]
mode = "emacs"
auto_match = true
autosuggestion = true

[editor.key_map]
Alt-Hyphen = " <- "
# Ctrl-Shift-m = " |> "

[prompt]
format = "{status}R {version}> "
continuation = "+  "
shell_format = "[{shell}] $ "
mode_indicator = "prefix"

[prompt.indicators]
reprex = "[reprex] "
autoformat = "true"

[prompt.status]
override_prompt_color = false

[prompt.status.symbol]
success = ""
error = "✗ "

[completion]
enabled = true
timeout_ms = 50
debounce_ms = 100
max_height = 10
function_paren_check_limit = 50

[history]
menu_max_height = 15
disabled = false

[reprex]
enabled = false
comment = "#> "
autoformat = false

[colors.r]
comment = "DarkGray"
string = "Green"
number = "LightMagenta"
keyword = "LightBlue"
constant = "LightCyan"
operator = "Yellow"
punctuation = "Default"
identifier = "Default"

[colors.meta]
command = "Magenta"

[colors.prompt]
main = "LightGreen"
continuation = "LightGreen"
shell = "LightRed"
indicator = "Yellow"

[colors.prompt.status]
success = "LightGreen"
error = "LightRed"

[experimental.history_forget]
enabled = false
delay = 2
on_exit_only = false
